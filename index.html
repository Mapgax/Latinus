<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua Viva – Latein spielerisch lernen</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23FF2D78'/><stop offset='50%25' stop-color='%23FFD700'/><stop offset='100%25' stop-color='%2300F5FF'/></linearGradient></defs><circle cx='32' cy='32' r='30' fill='%2307091a' stroke='url(%23g)' stroke-width='3'/><text x='32' y='26' text-anchor='middle' font-family='serif' font-weight='bold' font-size='18' fill='%23FFD700'>LV</text><text x='32' y='44' text-anchor='middle' font-family='serif' font-size='8' fill='%2300F5FF'>LINGUA VIVA</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:           #07091a;
            --pink:         #FF2D78;
            --gold:         #FFD700;
            --cyan:         #00F5FF;
            --purple:       #B44FFF;
            --green:        #22c55e;
            --orange:       #f59e0b;
            --red:          #ef4444;
            --glass:        rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.14);
            --text:         #EEF0FF;
            --text-dim:     rgba(238,240,255,0.5);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* ── Ambient light blobs (pure CSS, no JS) ─────────────────── */
        .blob {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            animation: drift 20s ease-in-out infinite alternate;
        }
        .blob-1 {
            width: 550px; height: 550px;
            top: -180px; left: -180px;
            background: radial-gradient(circle, rgba(255,45,120,0.22), transparent 70%);
            animation-duration: 18s;
        }
        .blob-2 {
            width: 480px; height: 480px;
            bottom: -120px; right: -120px;
            background: radial-gradient(circle, rgba(0,245,255,0.16), transparent 70%);
            animation-duration: 24s;
            animation-direction: alternate-reverse;
        }
        .blob-3 {
            width: 380px; height: 380px;
            top: 45%; left: 48%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(180,79,255,0.13), transparent 70%);
            animation-duration: 30s;
        }
        @keyframes drift {
            0%   { transform: translate(0,0)     scale(1); }
            100% { transform: translate(60px,50px) scale(1.18); }
        }

        /* ── Layout ─────────────────────────────────────────────────── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* ── Header ─────────────────────────────────────────────────── */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.7s ease;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF2D78 0%, #FFD700 50%, #00F5FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.06em;
            margin-bottom: 0.4rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        h1:hover { opacity: 0.8; }

        .subtitle {
            font-size: 1.05rem;
            color: var(--text-dim);
            font-style: italic;
            font-weight: 300;
            margin-bottom: 1.3rem;
        }

        /* ── Language Selector ──────────────────────────────────────── */
        .language-selector {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 0.38rem 1.1rem;
            background: transparent;
            border: 1.5px solid var(--glass-border);
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 0.84rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            border-radius: 20px;
        }
        .lang-btn:hover, .lang-btn.active {
            background: rgba(255,45,120,0.12);
            border-color: rgba(255,45,120,0.5);
            color: var(--text);
            box-shadow: 0 0 14px rgba(255,45,120,0.2);
        }

        /* ── Score Display ──────────────────────────────────────────── */
        .score-display {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            animation: fadeIn 0.5s ease 0.15s backwards;
        }

        .score-item { text-align: center; }

        .score-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .score-value {
            font-family: 'Cinzel', serif;
            font-size: 1.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── Game Card ──────────────────────────────────────────────── */
        .game-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease 0.25s backwards;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--pink), var(--gold), var(--cyan), var(--purple), var(--pink));
            background-size: 200% 100%;
            animation: shimmerBar 4s linear infinite;
        }
        @keyframes shimmerBar {
            0%   { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* ── Section titles ─────────────────────────────────────────── */
        .selection-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.4rem;
        }
        .selection-sub {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 1.8rem;
        }

        /* ─────────────────────────────────────────────────────────────
           STEP 1 – TOPIC SELECTION
        ───────────────────────────────────────────────────────────── */
        .topic-selection { text-align: center; }

        .topic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .topic-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.6rem 1rem;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--glass-border);
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            gap: 0.45rem;
            position: relative;
            overflow: hidden;
        }

        /* Individual glow per topic */
        .topic-card[data-topic="mythen"]:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(255,45,120,0.3);
            border-color: rgba(255,45,120,0.55);
            background: rgba(255,45,120,0.07);
        }
        .topic-card[data-topic="geschichte"]:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(255,215,0,0.28);
            border-color: rgba(255,215,0,0.55);
            background: rgba(255,215,0,0.06);
        }
        .topic-card[data-topic="alltagslatein"]:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0,245,255,0.25);
            border-color: rgba(0,245,255,0.5);
            background: rgba(0,245,255,0.05);
        }
        .topic-card[data-topic="ueberraschung"]:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(180,79,255,0.3);
            border-color: rgba(180,79,255,0.55);
            background: rgba(180,79,255,0.07);
        }

        .topic-emoji {
            font-size: 2.3rem;
            display: block;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
            transition: transform 0.3s ease;
        }
        .topic-card:hover .topic-emoji { transform: scale(1.12) rotate(-5deg); }

        .topic-name {
            font-size: 1rem;
            font-weight: 600;
        }

        .topic-desc {
            font-size: 0.76rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* ─────────────────────────────────────────────────────────────
           STEP 2 – DIFFICULTY SELECTION
        ───────────────────────────────────────────────────────────── */
        .difficulty-selection { text-align: center; }

        .step-back {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 1rem;
            padding: 0.3rem 0.4rem;
            border-radius: 6px;
            transition: color 0.2s;
        }
        .step-back:hover { color: var(--text); }

        .selected-topic-hint {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 0.3rem 1rem;
            font-size: 0.83rem;
            color: var(--text-dim);
            margin-bottom: 1.4rem;
        }

        .difficulty-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .difficulty-btn {
            padding: 1.2rem 2.2rem;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 14px;
            min-width: 140px;
        }

        .difficulty-btn.easy {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 4px 20px rgba(34,197,94,0.3);
        }
        .difficulty-btn.medium {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 4px 20px rgba(245,158,11,0.3);
        }
        .difficulty-btn.hard {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 20px rgba(239,68,68,0.3);
        }
        .difficulty-btn.easy:hover  { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(34,197,94,0.5);  filter: brightness(1.08); }
        .difficulty-btn.medium:hover{ transform: translateY(-5px); box-shadow: 0 10px 30px rgba(245,158,11,0.5); filter: brightness(1.08); }
        .difficulty-btn.hard:hover  { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(239,68,68,0.5);  filter: brightness(1.08); }

        .difficulty-btn .points-hint {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            opacity: 0.85;
            margin-top: 0.25rem;
        }

        /* ─────────────────────────────────────────────────────────────
           STEP 3 – QUESTION CONTAINER
        ───────────────────────────────────────────────────────────── */
        .question-container { display: none; }
        .question-container.active {
            display: block;
            animation: slideIn 0.4s ease;
        }

        .question-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .difficulty-badge, .topic-badge {
            padding: 0.28rem 0.85rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.74rem;
            font-weight: 600;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .topic-badge {
            background: rgba(0,245,255,0.1);
            border: 1px solid rgba(0,245,255,0.3);
            color: #5EEEFF;
        }

        .difficulty-badge {
            background: rgba(255,45,120,0.15);
            border: 1px solid rgba(255,45,120,0.4);
            color: #FF7FB0;
        }

        .question-number {
            font-size: 0.88rem;
            color: var(--text-dim);
            font-weight: 500;
            margin-left: auto;
        }

        .back-btn {
            padding: 0.28rem 0.85rem;
            background: transparent;
            border: 1.5px solid var(--glass-border);
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 0.74rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            border-radius: 20px;
            white-space: nowrap;
        }
        .back-btn:hover {
            border-color: rgba(255,255,255,0.35);
            color: var(--text);
            background: var(--glass);
        }

        /* ── Loading ─────────────────────────────────────────────────── */
        .loading {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-dim);
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top: 3px solid var(--pink);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            margin: 0 auto 1rem;
        }

        /* ── Question & Answers ─────────────────────────────────────── */
        .question-text {
            font-size: 1.45rem;
            line-height: 1.65;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 1.8rem;
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .answer-btn {
            padding: 1rem 1.3rem;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid var(--glass-border);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            transition: all 0.22s ease;
            border-radius: 12px;
        }

        .answer-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.32);
            transform: translateX(6px);
        }

        .answer-btn.correct {
            background: rgba(34,197,94,0.16);
            border-color: rgba(34,197,94,0.55);
            color: #86efac;
        }

        .answer-btn.incorrect {
            background: rgba(239,68,68,0.14);
            border-color: rgba(239,68,68,0.5);
            color: #fca5a5;
        }

        .answer-btn:disabled { cursor: not-allowed; opacity: 0.72; }

        /* ── Feedback ────────────────────────────────────────────────── */
        .feedback {
            margin-top: 1.2rem;
            padding: 1.2rem 1.4rem;
            background: rgba(255,215,0,0.06);
            border: 1px solid rgba(255,215,0,0.22);
            border-radius: 12px;
            display: none;
        }
        .feedback.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .feedback-title {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--gold);
        }

        .feedback-text {
            font-size: 0.95rem;
            line-height: 1.65;
            color: var(--text-dim);
            white-space: pre-line;
        }

        /* ── Next Button ─────────────────────────────────────────────── */
        .next-btn {
            margin-top: 1.3rem;
            padding: 0.85rem 2.2rem;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: white;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
            letter-spacing: 0.02em;
            display: none;
            box-shadow: 0 4px 22px rgba(255,45,120,0.3);
        }
        .next-btn.show {
            display: inline-block;
            animation: fadeIn 0.3s ease;
        }
        .next-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(255,45,120,0.5);
            filter: brightness(1.1);
        }

        /* ── Error ───────────────────────────────────────────────────── */
        .error-message {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.38);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }

        /* ── Footer ──────────────────────────────────────────────────── */
        footer {
            text-align: center;
            margin-top: 2.5rem;
            padding: 1.5rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            opacity: 0.65;
            animation: fadeIn 0.5s ease 0.5s backwards;
        }

        /* ── Animations ──────────────────────────────────────────────── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(18px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 600px) {
            h1 { font-size: 2.4rem; }
            .game-card { padding: 1.6rem 1.2rem; }
            .difficulty-buttons { flex-direction: column; }
            .difficulty-btn { width: 100%; }
            .topic-grid { gap: 0.75rem; }
            .topic-card { padding: 1.2rem 0.8rem; }
            .topic-emoji { font-size: 1.9rem; }
        }

        @media (max-width: 480px) {
            .container { padding: 1rem; }
            h1 { font-size: 2rem; }
            .subtitle { font-size: 0.9rem; }
            .score-label { font-size: 0.67rem; }
            .score-value { font-size: 1.5rem; }
            .question-text { font-size: 1.25rem; margin-bottom: 1.4rem; }
            .question-number { margin-left: 0; width: 100%; order: 3; }
            .game-card { padding: 1.3rem 0.9rem; }
            .topic-name { font-size: 0.9rem; }
            .topic-desc { font-size: 0.7rem; }
            .topic-emoji { font-size: 1.7rem; }
            header { margin-bottom: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <header>
            <h1 onclick="resetToStart()" title="Zurück zum Start">Lingua Viva</h1>
            <p class="subtitle" data-de="Latein spielerisch entdecken" data-la="Lingua Latina viva et praesens" data-ch="Latiin spielerisch entdecke">
                Latein spielerisch entdecken
            </p>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="de">Deutsch</button>
                <button class="lang-btn" data-lang="la">Latine</button>
                <button class="lang-btn" data-lang="ch">Schwiizerdütsch</button>
            </div>
        </header>

        <!-- SCORE -->
        <div class="score-display">
            <div class="score-item">
                <div class="score-label" data-de="Punkte" data-la="Puncta" data-ch="Pünkt">Punkte</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label" data-de="Richtig" data-la="Recte" data-ch="Richtig">Richtig</div>
                <div class="score-value" id="correct">0</div>
            </div>
            <div class="score-item">
                <div class="score-label" data-de="Gesamt" data-la="Summa" data-ch="Gsamt">Gesamt</div>
                <div class="score-value" id="total">0</div>
            </div>
        </div>

        <div class="game-card">

            <!-- ══ STEP 1: TOPIC ═════════════════════════════════════ -->
            <div class="topic-selection" id="topicSelection">
                <h2 class="selection-title"
                    data-de="Was willst du lernen?"
                    data-la="Quid discere vis?"
                    data-ch="Was wetsch lerne?">
                    Was willst du lernen?
                </h2>
                <p class="selection-sub"
                   data-de="Wähle ein Themengebiet"
                   data-la="Elige thema"
                   data-ch="Wähl es Thema">
                    Wähle ein Themengebiet
                </p>
                <div class="topic-grid">
                    <button class="topic-card" data-topic="mythen" onclick="selectTopic('mythen')">
                        <span class="topic-emoji">🏛️</span>
                        <span class="topic-name"
                              data-de="Mythen"
                              data-la="Mythi"
                              data-ch="Mythe">Mythen</span>
                        <span class="topic-desc"
                              data-de="Götter, Helden & Sagen"
                              data-la="Dei, Heroes, Fabulae"
                              data-ch="Götter, Helde & Sage">Götter, Helden & Sagen</span>
                    </button>

                    <button class="topic-card" data-topic="geschichte" onclick="selectTopic('geschichte')">
                        <span class="topic-emoji">⚔️</span>
                        <span class="topic-name"
                              data-de="Geschichte"
                              data-la="Historia"
                              data-ch="Geschichte">Geschichte</span>
                        <span class="topic-desc"
                              data-de="Rom, Politik & Kultur"
                              data-la="Roma, Politica, Cultura"
                              data-ch="Rom, Politik & Kultur">Rom, Politik & Kultur</span>
                    </button>

                    <button class="topic-card" data-topic="alltagslatein" onclick="selectTopic('alltagslatein')">
                        <span class="topic-emoji">🌍</span>
                        <span class="topic-name"
                              data-de="Lingua Viva"
                              data-la="Lingua Viva"
                              data-ch="Lingua Viva">Lingua Viva</span>
                        <span class="topic-desc"
                              data-de="Latein heute & überall"
                              data-la="Latine hodie ubique"
                              data-ch="Latiin hit & überall">Latein heute & überall</span>
                    </button>

                    <button class="topic-card" data-topic="ueberraschung" onclick="selectTopic('ueberraschung')">
                        <span class="topic-emoji">🎲</span>
                        <span class="topic-name"
                              data-de="Überrasche mich!"
                              data-la="Fortuito!"
                              data-ch="Überrasch mi!">Überrasche mich!</span>
                        <span class="topic-desc"
                              data-de="Alles gemischt"
                              data-la="Omnia mixta"
                              data-ch="Alles gmischt">Alles gemischt</span>
                    </button>
                </div>
            </div>

            <!-- ══ STEP 2: DIFFICULTY ════════════════════════════════ -->
            <div class="difficulty-selection" id="difficultySelection" style="display: none;">
                <div style="text-align: left;">
                    <button class="step-back" onclick="backToTopics()">← Zurück</button>
                </div>
                <div id="selectedTopicHint" class="selected-topic-hint"></div>
                <h2 class="selection-title"
                    data-de="Wähle deinen Level"
                    data-la="Elige gradum"
                    data-ch="Wähl din Level">
                    Wähle deinen Level
                </h2>
                <p class="selection-sub"
                   data-de="Schwierigkeitsgrad festlegen"
                   data-la="Gradum difficultatis elige"
                   data-ch="Schwirigkeitsgräd festlege">
                    Schwierigkeitsgrad festlegen
                </p>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn easy" onclick="startGame('easy')">
                        <span data-de="Einfach" data-la="Facilis" data-ch="Eifach">Einfach</span>
                        <span class="points-hint" data-de="10 Punkte" data-la="X puncta" data-ch="10 Pünkt">10 Punkte</span>
                    </button>
                    <button class="difficulty-btn medium" onclick="startGame('medium')">
                        <span data-de="Mittel" data-la="Medius" data-ch="Mittel">Mittel</span>
                        <span class="points-hint" data-de="25 Punkte" data-la="XXV puncta" data-ch="25 Pünkt">25 Punkte</span>
                    </button>
                    <button class="difficulty-btn hard" onclick="startGame('hard')">
                        <span data-de="Schwer" data-la="Difficilis" data-ch="Schwär">Schwer</span>
                        <span class="points-hint" data-de="50 Punkte" data-la="L puncta" data-ch="50 Pünkt">50 Punkte</span>
                    </button>
                </div>
            </div>

            <!-- ══ STEP 3: QUESTION ══════════════════════════════════ -->
            <div class="question-container" id="questionContainer">
                <div class="question-header">
                    <span class="topic-badge"      id="topicBadge"></span>
                    <span class="difficulty-badge" id="difficultyBadge"></span>
                    <span class="question-number"  id="questionNumber"></span>
                    <button class="back-btn" onclick="changeDifficulty()"
                            data-de="Level ändern" data-la="Gradum mutare" data-ch="Level änder">
                        Level ändern
                    </button>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p data-de="Frage wird geladen…" data-la="Quaestio paratur…" data-ch="Frag wird glade…">Frage wird geladen…</p>
                </div>

                <div id="questionContent" style="display: none;">
                    <div class="question-text"  id="questionText"></div>
                    <div class="answer-options"  id="answerOptions"></div>
                    <div class="feedback"        id="feedback">
                        <div class="feedback-title" id="feedbackTitle"></div>
                        <div class="feedback-text"  id="feedbackText"></div>
                    </div>
                    <button class="next-btn" id="nextBtn" onclick="nextQuestion()"
                            data-de="Nächste Frage →" data-la="Proxima quaestio →" data-ch="Nächschti Frag →">
                        Nächste Frage →
                    </button>
                </div>
            </div>

        </div><!-- .game-card -->

        <footer>
            <p>© 2026 – Fachschaft Latein an der KSK</p>
            <p style="margin-top: 0.4rem;">
                <span data-de="Powered by Claude AI & OpenAI – Keine Daten werden gespeichert"
                      data-la="Potentia Claude AI et OpenAI – Nulla data servantur"
                      data-ch="Powered by Claude AI & OpenAI – Kei Date wärdid gspeichert">
                    Powered by Claude AI & OpenAI – Keine Daten werden gespeichert
                </span>
            </p>
        </footer>
    </div>

    <script>
        // ── Game State ───────────────────────────────────────────────────
        let currentLanguage   = 'de';
        let currentDifficulty = null;
        let currentTopic      = null;
        let currentQuestion   = null;
        let score             = 0;
        let correctAnswers    = 0;
        let totalQuestions    = 0;
        let previousQuestions = [];

        const pointValues = { easy: 10, medium: 25, hard: 50 };

        // Human-readable topic labels per language
        const topicLabels = {
            de: {
                mythen:        '🏛️ Mythen',
                geschichte:    '⚔️ Geschichte',
                alltagslatein: '🌍 Lingua Viva',
                ueberraschung: '🎲 Überraschung'
            },
            la: {
                mythen:        '🏛️ Mythi',
                geschichte:    '⚔️ Historia',
                alltagslatein: '🌍 Lingua Viva',
                ueberraschung: '🎲 Fortuito'
            },
            ch: {
                mythen:        '🏛️ Mythe',
                geschichte:    '⚔️ Geschichte',
                alltagslatein: '🌍 Lingua Viva',
                ueberraschung: '🎲 Überraschig'
            }
        };

        const translations = {
            de: {
                difficultyEasy:   'Einfach',
                difficultyMedium: 'Mittel',
                difficultyHard:   'Schwer',
                questionPrefix:   'Frage',
                correct:          'Richtig! 🎉',
                incorrect:        'Leider falsch! 😔',
                correctAnswer:    'Die richtige Antwort war:',
                loading:          'Frage wird geladen…',
                error:            'Fehler beim Laden der Frage. Bitte versuche es erneut.'
            },
            la: {
                difficultyEasy:   'Facilis',
                difficultyMedium: 'Medius',
                difficultyHard:   'Difficilis',
                questionPrefix:   'Quaestio',
                correct:          'Recte! 🎉',
                incorrect:        'Non recte! 😔',
                correctAnswer:    'Responsio recta erat:',
                loading:          'Quaestio paratur…',
                error:            'Error in quaestione paranda. Iterum tempta.'
            },
            ch: {
                difficultyEasy:   'Eifach',
                difficultyMedium: 'Mittel',
                difficultyHard:   'Schwär',
                questionPrefix:   'Frag',
                correct:          'Richtig! 🎉',
                incorrect:        'Läider falsch! 😔',
                correctAnswer:    'Di richtigi Antwort isch gsi:',
                loading:          'Frag wird glade…',
                error:            'Fähler bim Lade. Bitte probiers nomol.'
            }
        };

        // ── Language Switching ───────────────────────────────────────────
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = btn.dataset.lang;
                updateLanguage();
                if (currentTopic) updateTopicHint();
            });
        });

        function updateLanguage() {
            document.querySelectorAll('[data-de]').forEach(el => {
                if (el.hasAttribute(`data-${currentLanguage}`)) {
                    el.textContent = el.getAttribute(`data-${currentLanguage}`);
                }
            });
        }

        // ── Step 1: Topic ────────────────────────────────────────────────
        function selectTopic(topic) {
            currentTopic = topic;
            document.getElementById('topicSelection').style.display = 'none';
            document.getElementById('difficultySelection').style.display = 'block';
            updateTopicHint();
        }

        function updateTopicHint() {
            const hint = document.getElementById('selectedTopicHint');
            hint.textContent = topicLabels[currentLanguage][currentTopic] || '';
        }

        function backToTopics() {
            currentTopic = null;
            document.getElementById('difficultySelection').style.display = 'none';
            document.getElementById('topicSelection').style.display = 'block';
        }

        // ── Step 2: Start Game ───────────────────────────────────────────
        function startGame(difficulty) {
            currentDifficulty = difficulty;
            document.getElementById('difficultySelection').style.display = 'none';
            document.getElementById('questionContainer').classList.add('active');

            // Set badges
            const diffKey = `difficulty${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
            document.getElementById('difficultyBadge').textContent = translations[currentLanguage][diffKey];
            document.getElementById('topicBadge').textContent = topicLabels[currentLanguage][currentTopic] || '';

            loadQuestion();
        }

        // ── Load Question from API ───────────────────────────────────────
        async function loadQuestion() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('questionContent').style.display = 'none';
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('nextBtn').classList.remove('show');

            try {
                const response = await fetch('/api/question', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        difficulty:        currentDifficulty,
                        topic:             currentTopic,
                        previousQuestions: previousQuestions
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('API Error:', errorData);
                    throw new Error(errorData.error || 'API request failed');
                }

                currentQuestion = await response.json();
                previousQuestions.push(currentQuestion.question);
                displayQuestion();

            } catch (error) {
                console.error('Error loading question:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="error-message">
                        ${translations[currentLanguage].error}<br>
                        <small style="margin-top: 0.5rem; display: block; opacity: 0.6;">
                            Details: ${error.message}
                        </small>
                    </div>
                    <button class="next-btn show" onclick="loadQuestion()" style="display:inline-block; margin-top:1rem;">
                        Erneut versuchen
                    </button>
                `;
            }
        }

        // ── Display Question ─────────────────────────────────────────────
        function displayQuestion() {
            totalQuestions++;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('questionContent').style.display = 'block';

            document.getElementById('questionNumber').textContent =
                `${translations[currentLanguage].questionPrefix} ${totalQuestions}`;
            document.getElementById('questionText').textContent = currentQuestion.question;

            const optionsContainer = document.getElementById('answerOptions');
            optionsContainer.innerHTML = '';

            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });

            updateScore();
        }

        // ── Check Answer ─────────────────────────────────────────────────
        function checkAnswer(selectedIndex) {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = true);

            const isCorrect = selectedIndex === currentQuestion.correctIndex;
            buttons[selectedIndex].classList.add(isCorrect ? 'correct' : 'incorrect');
            if (!isCorrect) {
                buttons[currentQuestion.correctIndex].classList.add('correct');
            }

            if (isCorrect) {
                correctAnswers++;
                score += pointValues[currentDifficulty];
            }

            updateScore();
            showFeedback(isCorrect);
        }

        // ── Show Feedback ────────────────────────────────────────────────
        function showFeedback(isCorrect) {
            const feedback = document.getElementById('feedback');
            document.getElementById('feedbackTitle').textContent = isCorrect
                ? translations[currentLanguage].correct
                : translations[currentLanguage].incorrect;

            let explanation = currentQuestion.explanation;
            if (!isCorrect) {
                explanation = `${translations[currentLanguage].correctAnswer} ${currentQuestion.options[currentQuestion.correctIndex]}\n\n${explanation}`;
            }

            document.getElementById('feedbackText').textContent = explanation;
            feedback.classList.add('show');
            document.getElementById('nextBtn').classList.add('show');
        }

        function nextQuestion() { loadQuestion(); }

        function updateScore() {
            document.getElementById('score').textContent   = score;
            document.getElementById('correct').textContent = correctAnswers;
            document.getElementById('total').textContent   = totalQuestions;
        }

        // ── Change Difficulty (keep topic + score) ───────────────────────
        function changeDifficulty() {
            currentDifficulty = null;
            currentQuestion   = null;

            document.getElementById('questionContainer').classList.remove('active');
            document.getElementById('difficultySelection').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('questionContent').style.display = 'none';
            updateTopicHint();
            resetLoadingHtml();
        }

        // ── Full Reset (header click) ────────────────────────────────────
        function resetToStart() {
            score = 0; correctAnswers = 0; totalQuestions = 0;
            previousQuestions = [];
            currentDifficulty = null; currentTopic = null; currentQuestion = null;
            updateScore();

            document.getElementById('questionContainer').classList.remove('active');
            document.getElementById('difficultySelection').style.display = 'none';
            document.getElementById('topicSelection').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('questionContent').style.display = 'none';
            resetLoadingHtml();
        }

        function resetLoadingHtml() {
            const lang = currentLanguage;
            document.getElementById('loading').innerHTML = `
                <div class="spinner"></div>
                <p data-de="Frage wird geladen…" data-la="Quaestio paratur…" data-ch="Frag wird glade…">
                    ${lang === 'la' ? 'Quaestio paratur…' : lang === 'ch' ? 'Frag wird glade…' : 'Frage wird geladen…'}
                </p>
            `;
        }

        // Initialize
        updateLanguage();
    </script>
</body>
</html>
